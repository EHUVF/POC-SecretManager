name: Deploy Final POC

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT: 263611243832
  ECR_REPOSITORY: poc-app-db-secrets-repo
  CLUSTER_NAME: poc-cluster
  SERVICE_NAME: poc-service

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Autenticação via OIDC
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::263611243832:role/poc-github-actions-role
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      # 2. Setup MSBuild e NuGet
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # 3. Restaurar pacotes NuGet (ESSENCIAL PARA GERAR O ASSETS FILE)
      - name: Restore NuGet Packages
        run: nuget restore

      # 4. Compilar o projeto
      - name: Build Project
        run: |
          msbuild . /p:Configuration=Release /p:OutputPath=bin/ /p:DeployOnBuild=true /p:WebPublishMethod=FileSystem /p:publishUrl=bin/publish

      # 5. Login no ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Build e Push da imagem
      - name: Build, Tag, and Push to ECR
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }} .
          docker tag ${{ env.ECR_REPOSITORY }}:latest ${{ env.AWS_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.AWS_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest

      # 7. Deploy no ECS
      - name: Deploy to Amazon ECS
        run: |
          aws ecs update-service --cluster ${{ env.CLUSTER_NAME }} --service ${{ env.SERVICE_NAME }} --force-new-deployment
